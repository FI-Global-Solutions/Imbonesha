<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flag Escalated — Imbonesha</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .header { background-color: #dc2626; padding: 24px 32px; }
    .header h1 { margin: 0; color: #ffffff; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .body { padding: 32px; color: #18181b; }
    .body h2 { margin: 0 0 8px; font-size: 22px; font-weight: 700; color: #18181b; }
    .body p { margin: 0 0 24px; font-size: 15px; line-height: 1.6; color: #52525b; }
    .card { background: #f9fafb; border: 1px solid #e4e4e7; border-radius: 6px; padding: 20px 24px; margin-bottom: 28px; }
    .card-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; font-size: 14px; }
    .card-row:last-child { margin-bottom: 0; }
    .card-label { color: #71717a; font-weight: 500; min-width: 130px; }
    .card-value { color: #18181b; font-weight: 600; text-align: right; }
    .btn { display: inline-block; background-color: #dc2626; color: #ffffff !important; text-decoration: none; padding: 12px 28px; border-radius: 6px; font-size: 15px; font-weight: 600; }
    .footer { padding: 20px 32px; border-top: 1px solid #e4e4e7; font-size: 12px; color: #a1a1aa; text-align: center; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Imbonesha</h1>
    </div>
    <div class="body">
      <h2>Flag Escalated</h2>
      <p>A critical flag has been escalated and requires immediate attention.</p>

      <div class="card">
        <div class="card-row">
          <span class="card-label">Parcel</span>
          <span class="card-value">{{ parcel.upi }}</span>
        </div>
        <div class="card-row">
          <span class="card-label">District</span>
          <span class="card-value">{{ parcel.district }}</span>
        </div>
      </div>

      <a href="{{ dashboard_url }}" class="btn">View Flag</a>
    </div>
    <div class="footer">
      This is an automated notification from Imbonesha &mdash; Rwanda Housing Authority Change Detection System.<br>
      Do not reply to this email.
    </div>
  </div>
</body>
</html>
